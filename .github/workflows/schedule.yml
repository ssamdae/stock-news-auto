name: Daily Stock News Parser

on:
  schedule:
# 한국 시간(KST) 기준: 매일 오후 11시, 오전 5시에 실행
    # 깃허브(UTC) 기준: 매일 14시, 20시에 실행
    - cron: '0 14,20 * * *'

    # 한국 시간(KST) 기준: 매일 오전 8시 30분에 실행
    # 깃허브(UTC) 기준: 매일 23시 30분에 실행
    - cron: '30 23 * * *'
    
  workflow_dispatch: # 이 줄이 있어야 내가 원할 때 수동으로 버튼을 눌러 실행해 볼 수 있습니다.

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 파이썬 스크립트 실행 (main.py)
      env:
        # 금고(Secrets)에 넣어둔 값들을 꺼내서 파이썬에게 전달합니다.
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: python main.py
